<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X ENERGI - AU BESS</title>
    <style>
      body { margin: 0; background: #0a0e17; }
      #app-loader {
        position: fixed; inset: 0; display: flex;
        flex-direction: column; align-items: center; justify-content: center;
        background: #0a0e17; z-index: 9999;
      }
      #app-loader .spinner {
        width: 40px; height: 40px; border: 3px solid rgba(0,255,136,0.15);
        border-top-color: #00ff88; border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      #app-loader .brand {
        margin-top: 16px; color: #00ff88; font-family: system-ui;
        font-size: 14px; font-weight: 600; letter-spacing: 2px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="app-loader">
      <div class="spinner"></div>
      <div class="brand">X ENERGI</div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
